<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agar.io Clone</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f1220;
      font-family: Arial, Helvetica, sans-serif;
      user-select: none;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #1c2140 0%, #11162b 60%, #0b0f1d 100%);
    }
    .hud {
      position: fixed;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0,0,0,0.25);
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
      backdrop-filter: blur(6px);
      min-width: 190px;
    }
    .meter {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .meter .fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #67e8f9, #22c55e);
      border-radius: 999px;
      transform-origin: left center;
      transform: scaleX(1);
    }
    .meterLabel {
      margin-top: 4px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
    }
    .hint {
      position: fixed;
      bottom: 12px;
      left: 12px;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.22);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud" id="hud">
    <div id="hudText">Loading...</div>
    <div class="meter"><div class="fill" id="sprintFill"></div></div>
    <div class="meterLabel" id="sprintLabel">Sprint</div>
  </div>
  <div class="hint">Mouse = steer. Space = split. Hold W = sprint.</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const hudText = document.getElementById('hudText');
    const sprintFill = document.getElementById('sprintFill');
    const sprintLabel = document.getElementById('sprintLabel');

    const WORLD = { w: 5000, h: 5000 };
    const FOOD_COUNT = 450;
    const BOT_COUNT = 12;
    const MAX_PLAYER_PARTS = 16;
    const colors = ['#ff6b6b','#ffd93d','#6bcB77','#4d96ff','#b983ff','#ff8fab','#f7b267','#7bdff2'];

    let W = 0, H = 0, DPR = 1;
    let mouse = { x: 0, y: 0 };
    let keys = { w: false };
    let splitQueued = false;
    let camera = { x: WORLD.w / 2, y: WORLD.h / 2, zoom: 1 };
    let lastTime = performance.now();
    let sprintEnergy = 100;
    const MAX_SPRINT = 100;

    function resize() {
      DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        splitQueued = true;
      }
      if (e.code === 'KeyW') {
        keys.w = true;
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'KeyW') keys.w = false;
    });

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }
    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }
    function dist(ax, ay, bx, by) {
      return Math.hypot(ax - bx, ay - by);
    }
    function massToRadius(m) {
      return Math.sqrt(m) * 4;
    }

    const foods = [];
    const cells = [];

    function spawnFood() {
      return {
        x: rand(20, WORLD.w - 20),
        y: rand(20, WORLD.h - 20),
        r: rand(3, 7),
        color: colors[(Math.random() * colors.length) | 0]
      };
    }

    function spawnCell(name, isPlayer = false) {
      const mass = isPlayer ? 120 : rand(40, 120);
      return {
        name,
        isPlayer,
        x: rand(100, WORLD.w - 100),
        y: rand(100, WORLD.h - 100),
        vx: 0,
        vy: 0,
        mass,
        r: massToRadius(mass),
        color: colors[(Math.random() * colors.length) | 0],
        alive: true,
        target: { x: rand(0, WORLD.w), y: rand(0, WORLD.h) },
        splitCooldown: 0,
        mergeTimer: 0
      };
    }

    function playerCells() {
      return cells.filter(c => c.alive && c.isPlayer);
    }

    function totalPlayerMass() {
      return playerCells().reduce((sum, c) => sum + c.mass, 0);
    }

    function spawnPlayerAtCenter() {
      const p = spawnCell('You', true);
      p.x = WORLD.w / 2;
      p.y = WORLD.h / 2;
      p.mass = 120;
      p.r = massToRadius(p.mass);
      cells.push(p);
      return p;
    }

    spawnPlayerAtCenter();
    for (let i = 0; i < BOT_COUNT; i++) cells.push(spawnCell('Bot ' + (i + 1)));
    for (let i = 0; i < FOOD_COUNT; i++) foods.push(spawnFood());

    function splitCell(cell, dirX, dirY) {
      if (cell.mass < 80 || cell.splitCooldown > 0) return false;
      const newMass = cell.mass / 2;
      cell.mass = newMass;

      const len = Math.hypot(dirX, dirY) || 1;
      const nx = dirX / len;
      const ny = dirY / len;

      const child = {
        name: cell.isPlayer ? 'You' : cell.name,
        isPlayer: cell.isPlayer,
        x: clamp(cell.x + nx * cell.r * 1.15, 0, WORLD.w),
        y: clamp(cell.y + ny * cell.r * 1.15, 0, WORLD.h),
        vx: cell.vx + nx * 900,
        vy: cell.vy + ny * 900,
        mass: newMass,
        r: massToRadius(newMass),
        color: cell.color,
        alive: true,
        target: { x: rand(0, WORLD.w), y: rand(0, WORLD.h) },
        splitCooldown: 1.0,
        mergeTimer: 1.8
      };

      cell.vx -= nx * 90;
      cell.vy -= ny * 90;
      cell.splitCooldown = 1.0;
      cell.mergeTimer = 1.8;
      cells.push(child);
      return true;
    }

    function updatePlayer(dt) {
      const dx = mouse.x - W / 2;
      const dy = mouse.y - H / 2;
      const len = Math.hypot(dx, dy) || 1;
      const nx = dx / len;
      const ny = dy / len;

      const sprinting = keys.w && sprintEnergy > 0.5;
      if (sprinting) {
        sprintEnergy = clamp(sprintEnergy - 34 * dt, 0, MAX_SPRINT);
      } else {
        sprintEnergy = clamp(sprintEnergy + 18 * dt, 0, MAX_SPRINT);
      }

      const parts = playerCells();
      for (const c of parts) {
        const moveSpeed = Math.max(65, 215 - c.r * 1.15);
        const accel = sprinting ? 520 : 260;
        c.vx += nx * accel * dt;
        c.vy += ny * accel * dt;
        c.vx = clamp(c.vx, -moveSpeed * (sprinting ? 1.7 : 1.0), moveSpeed * (sprinting ? 1.7 : 1.0));
        c.vy = clamp(c.vy, -moveSpeed * (sprinting ? 1.7 : 1.0), moveSpeed * (sprinting ? 1.7 : 1.0));
      }

      if (splitQueued) {
        splitQueued = false;
        const currentParts = playerCells();
        if (currentParts.length < MAX_PLAYER_PARTS) {
          for (const c of currentParts) {
            if (playerCells().length >= MAX_PLAYER_PARTS) break;
            splitCell(c, nx, ny);
          }
        }
      }
    }

    function updateBots(dt) {
      for (const c of cells) {
        if (c.isPlayer || !c.alive) continue;
        if (Math.random() < 0.01) {
          c.target.x = rand(0, WORLD.w);
          c.target.y = rand(0, WORLD.h);
        }
        let dx = c.target.x - c.x;
        let dy = c.target.y - c.y;
        let len = Math.hypot(dx, dy) || 1;
        dx /= len; dy /= len;
        const speed = Math.max(55, 180 - c.r * 1.1);
        c.vx += dx * speed * dt * 0.6;
        c.vy += dy * speed * dt * 0.6;
      }
    }

    function applyPhysics(dt) {
      for (const c of cells) {
        if (!c.alive) continue;
        c.x += c.vx * dt;
        c.y += c.vy * dt;
        c.vx *= Math.pow(0.18, dt);
        c.vy *= Math.pow(0.18, dt);

        c.x = clamp(c.x, c.r, WORLD.w - c.r);
        c.y = clamp(c.y, c.r, WORLD.h - c.r);
        c.mass = Math.max(20, c.mass);
        c.r = massToRadius(c.mass);

        c.splitCooldown = Math.max(0, c.splitCooldown - dt);
        c.mergeTimer = Math.max(0, c.mergeTimer - dt);
      }
    }

    function eatFood() {
      for (const c of cells) {
        if (!c.alive) continue;
        for (let i = foods.length - 1; i >= 0; i--) {
          const f = foods[i];
          if (dist(c.x, c.y, f.x, f.y) < c.r + f.r) {
            c.mass += f.r * 2.4;
            foods[i] = spawnFood();
          }
        }
      }
    }

    function eatCells() {
      const aliveCells = cells.filter(c => c.alive);
      for (const a of aliveCells) {
        for (const b of aliveCells) {
          if (a === b || !a.alive || !b.alive) continue;
          if (a.isPlayer && b.isPlayer) continue;
          if (a.mass <= b.mass * 1.12) continue;
          const d = dist(a.x, a.y, b.x, b.y);
          if (d < a.r - b.r * 0.2) {
            b.alive = false;
            a.mass += b.mass * 0.85;
          }
        }
      }

      for (let i = 0; i < cells.length; i++) {
        if (cells[i].alive) continue;
        if (!cells[i].isPlayer) cells[i] = spawnCell('Bot');
      }

      if (playerCells().length === 0) {
        spawnPlayerAtCenter();
      }
    }

    function mergePlayerCells() {
      const parts = playerCells();
      for (let i = 0; i < parts.length; i++) {
        for (let j = i + 1; j < parts.length; j++) {
          const a = parts[i];
          const b = parts[j];
          if (!a.alive || !b.alive) continue;
          if (a.mergeTimer > 0 || b.mergeTimer > 0) continue;
          const d = dist(a.x, a.y, b.x, b.y);
          if (d < (a.r + b.r) * 0.55) {
            const keep = a.mass >= b.mass ? a : b;
            const remove = keep === a ? b : a;
            const total = keep.mass + remove.mass;
            keep.x = (keep.x * keep.mass + remove.x * remove.mass) / total;
            keep.y = (keep.y * keep.mass + remove.y * remove.mass) / total;
            keep.vx = (keep.vx + remove.vx) * 0.5;
            keep.vy = (keep.vy + remove.vy) * 0.5;
            keep.mass = total;
            remove.alive = false;
          }
        }
      }
    }

    function updateCamera() {
      const parts = playerCells();
      if (parts.length === 0) {
        camera.x = WORLD.w / 2;
        camera.y = WORLD.h / 2;
        camera.zoom = 1;
        return;
      }

      let sumX = 0;
      let sumY = 0;
      let maxR = 0;
      let totalMass = 0;
      for (const c of parts) {
        sumX += c.x;
        sumY += c.y;
        totalMass += c.mass;
        if (c.r > maxR) maxR = c.r;
      }

      camera.x = sumX / parts.length;
      camera.y = sumY / parts.length;
      camera.zoom = clamp(1.32 - maxR / 260 - (parts.length - 1) * 0.03 - totalMass / 14000, 0.22, 1.1);
    }

    function worldToScreen(x, y) {
      return {
        x: (x - camera.x) * camera.zoom + W / 2,
        y: (y - camera.y) * camera.zoom + H / 2
      };
    }

    function drawGrid() {
      const gap = 100 * camera.zoom;
      const startX = ((-camera.x * camera.zoom + W / 2) % gap) - gap;
      const startY = ((-camera.y * camera.zoom + H / 2) % gap) - gap;

      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for (let x = startX; x < W; x += gap) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = startY; y < H; y += gap) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawBorder() {
      const tl = worldToScreen(0, 0);
      const br = worldToScreen(WORLD.w, WORLD.h);
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.lineWidth = 4;
      ctx.strokeRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);
      ctx.restore();
    }

    function drawFood() {
      for (const f of foods) {
        const p = worldToScreen(f.x, f.y);
        if (p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) continue;
        ctx.beginPath();
        ctx.fillStyle = f.color;
        ctx.arc(p.x, p.y, f.r * camera.zoom, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawCells() {
      const visible = [...cells].filter(c => c.alive).sort((a, b) => a.r - b.r);
      for (const c of visible) {
        const p = worldToScreen(c.x, c.y);
        const r = c.r * camera.zoom;
        if (p.x < -r - 20 || p.x > W + r + 20 || p.y < -r - 20 || p.y > H + r + 20) continue;

        ctx.beginPath();
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.arc(p.x + 5, p.y + 8, r, 0, Math.PI * 2);
        ctx.fill();

        const grad = ctx.createRadialGradient(p.x - r * 0.3, p.y - r * 0.3, r * 0.2, p.x, p.y, r);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.15, c.color);
        grad.addColorStop(1, '#111');
        ctx.beginPath();
        ctx.fillStyle = grad;
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.lineWidth = Math.max(2, 4 * camera.zoom);
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.stroke();

        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `${Math.max(12, r * 0.26)}px Arial`;
        ctx.fillText(c.name, p.x, p.y - r * 0.15);

        ctx.font = `${Math.max(10, r * 0.18)}px Arial`;
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillText(Math.floor(c.mass), p.x, p.y + r * 0.18);
      }
    }

    function drawLeaderboard() {
      const sorted = cells.filter(c => c.alive).sort((a, b) => b.mass - a.mass).slice(0, 5);
      const panelX = W - 180;
      const panelY = 12;
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      roundRect(ctx, panelX, panelY, 168, 150, 14);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px Arial';
      ctx.fillText('Leaderboard', panelX + 14, panelY + 24);
      ctx.font = '14px Arial';
      sorted.forEach((c, i) => {
        ctx.fillStyle = i === 0 ? '#fff' : 'rgba(255,255,255,0.88)';
        ctx.fillText(`${i + 1}. ${c.name} - ${Math.floor(c.mass)}`, panelX + 14, panelY + 50 + i * 22);
      });
      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function updateHud() {
      const parts = playerCells().length;
      const mass = totalPlayerMass();
      hudText.innerHTML = `Mass: <b>${Math.floor(mass)}</b><br>Player parts: <b>${parts}</b><br>Food: <b>${foods.length}</b><br>Bots: <b>${cells.filter(c => c.alive && !c.isPlayer).length}</b>`;
      sprintFill.style.transform = `scaleX(${sprintEnergy / MAX_SPRINT})`;
      sprintLabel.textContent = sprintEnergy > 0.5 ? 'Sprint' : 'Recovering';
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - lastTime) / 1000);
      lastTime = now;

      updatePlayer(dt);
      updateBots(dt);
      applyPhysics(dt);
      eatFood();
      eatCells();
      mergePlayerCells();
      updateCamera();
      updateHud();

      ctx.clearRect(0, 0, W, H);
      drawGrid();
      drawBorder();
      drawFood();
      drawCells();
      drawLeaderboard();

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
